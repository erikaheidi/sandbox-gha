name: Dummy Scanner

on:
  pull_request_target:
    types: [opened, synchronize]


jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Run Dummy Scanner on base branch
        id: scan_base
        uses: erikaheidi/dummy-scanner@4133b63dddf14f172abeb5158c83d4c3a48ae121
        with:
          directory: base

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Run Dummy Scanner on PR branch
        id: scan_pr
        uses: erikaheidi/dummy-scanner@4133b63dddf14f172abeb5158c83d4c3a48ae121
        with:
          directory: head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run test suite on PR branch
        id: tests
        env:
          DUMMY_TOKEN: ${{ secrets.DUMMY_KEY }}
          DUMMY_SECRET: ${{ secrets.DUMMY_SECRET }}
        working-directory: head
        continue-on-error: true
        run: |
          npm ci
          npm test -- --json --outputFile=../test-results.json

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const base = parseInt('${{ steps.scan_base.outputs.total_files }}');
            const pr = parseInt('${{ steps.scan_pr.outputs.total_files }}');
            const diff = pr - base;
            const diffLabel = diff > 0 ? `+${diff} files added` : diff < 0 ? `${Math.abs(diff)} files removed` : 'No change in file count';
            const diffIcon = diff > 0 ? '📈' : diff < 0 ? '📉' : '✅';

            let testSummary = '⚠️ Test results unavailable';
            try {
              const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
              const icon = results.success ? '✅' : '❌';
              testSummary = `${icon} **${results.numPassedTests}/${results.numTotalTests} tests passed**`;
              if (results.numFailedTests > 0) {
                testSummary += ` (${results.numFailedTests} failed)`;
              }
            } catch (e) {}

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Dummy Scanner Results',
                '',
                '| Branch | Total Files |',
                '|--------|-------------|',
                `| Base (\`${{ github.base_ref }}\`) | ${base} |`,
                `| PR (\`${{ github.head_ref }}\`) | ${pr} |`,
                '',
                `${diffIcon} **${diffLabel}**`,
                '',
                '## Test Suite Results',
                '',
                testSummary
              ].join('\n')
            });
